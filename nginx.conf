# 1. 裸IP访问处理
server {
    listen 80;
    server_name 34.158.221.145;
    return 301 http://www.trandsai.com$request_uri;
}

# 2. trandsai.com 主域名跳转 www.trandsai.com
server {
    listen 80;
    server_name trandsai.com;
    return 301 http://www.trandsai.com$request_uri;
}

# 3. console.trandsai.com 独立子域名（管理后台）
server {
    listen 80;
    server_name console.trandsai.com;

    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html/file;
        try_files $uri;
    }

    location / {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}

# 4. www.trandsai.com 主站点
server {
    listen 80;
    server_name www.trandsai.com;

    # ✅ 正确配置域名验证路径
    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html/file;
        try_files $uri;
    }

    # 主前端页面
    location / {
        root /usr/share/nginx/html/frontend;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # 图片静态资源
    location /data/images/ {
        root /usr/share/nginx/html;
        expires 30d;
    }

    # API转发
    location /companions/ {
        proxy_pass http://trandsai-backend:8000/companions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /knowledge/ {
        proxy_pass http://trandsai-backend:8000/knowledge/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /api/ {
        proxy_pass http://trandsai-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://trandsai-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # Swagger
    location = /docs {
        proxy_pass http://trandsai-backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs/ {
        proxy_pass http://trandsai-backend:8000/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://trandsai-backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}