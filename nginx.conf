# 后端连接池（ip_hash 保证同一客户端连到同一 worker，WebSocket 需要）
upstream backend_pool {
    ip_hash;
    server trandsai-backend:8000;
}

# 统一80端口全部域名跳转HTTPS
server {
    listen 80;
    server_name trandsai.com www.trandsai.com console.trandsai.com;
    return 301 https://$host$request_uri;
}

# console.trandsai.com HTTPS 管理后台
server {
    listen 443 ssl;
    proxy_http_version 1.1;
    server_name console.trandsai.com;
    ssl_certificate /etc/nginx/cert/trandsai.com_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/trandsai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html/file;
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://backend_pool/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # ✅ 前缀优先匹配，匹配 /companions 和 /companions/ 及参数
    location ^~ /companions {
        proxy_pass http://backend_pool/companions;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # ✅ 前缀优先匹配
    location ^~ /knowledge {
        proxy_pass http://backend_pool/knowledge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /ws/ {
        proxy_pass http://backend_pool/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location = /docs {
        proxy_pass http://backend_pool/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs/ {
        proxy_pass http://backend_pool/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://backend_pool/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源（CSS/JS/图片等）
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html/admin;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}

# www.trandsai.com HTTPS 主站点
server {
    listen 443 ssl;
    proxy_http_version 1.1;
    server_name www.trandsai.com trandsai.com;

    add_header X-Frame-Options "ALLOW-FROM https://console.trandsai.com" always;
    add_header Content-Security-Policy "frame-ancestors https://console.trandsai.com" always;

    ssl_certificate /etc/nginx/cert/trandsai.com_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/trandsai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location /agreement/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            expires 7d;
            add_header Content-Type "text/html; charset=utf-8";
    }
    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html/file;
