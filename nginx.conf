server {
    listen 80;
    server_name trandsai.com;

    # 主域名 trandsai.com 永久重定向到 www.trandsai.com
    return 301 http://www.trandsai.com$request_uri;
}

server {
    listen 80;
    server_name www.trandsai.com;

    # 域名认证文件
    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html;
        try_files /file/$uri /file/file/fileauth.txt;
    }

    # 用户端主页面
    location / {
        root /usr/share/nginx/html/frontend;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # 管理端页面 console.trandsai.com
    location / {
        if ($host = console.trandsai.com) {
            root /usr/share/nginx/html/admin;
            try_files $uri $uri/ /index.html;
            index index.html;
        }
    }

    # 管理端直接路由写法（备选，推荐用单独server块，下面版本更清晰）
    # location /admin {
    #     alias /usr/share/nginx/html/admin;
    #     try_files $uri $uri/ /index.html;
    #     index index.html;
    # }

    # 数据文件
    location /data/images/ {
        root /usr/share/nginx/html;
        expires 30d;
    }

    # API 转发（补全末尾斜线保证路径匹配正确）
    location /companions/ {
        proxy_pass http://trandsai-backend:8000/companions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    location /knowledge/ {
        proxy_pass http://trandsai-backend:8000/knowledge/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    location /api/ {
        proxy_pass http://trandsai-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://trandsai-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # Swagger 文档
    location = /docs {
        proxy_pass http://trandsai-backend:8000/docs;