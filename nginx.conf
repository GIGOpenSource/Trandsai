# 1. 裸IP访问处理
server {
    listen 80;
    server_name 34.158.221.145;
    return 301 https://www.trandsai.com$request_uri;
}

# 2. trandsai.com 主域名跳转 www.trandsai.com HTTPS
server {
    listen 80;
    server_name trandsai.com;
    return 301 https://www.trandsai.com$request_uri;
}

# 3. console.trandsai.com HTTP跳转HTTPS
server {
    listen 80;
    server_name console.trandsai.com;
    return 301 https://console.trandsai.com$request_uri;
}

# 4. www.trandsai.com HTTP跳转HTTPS
server {
    listen 80;
    server_name www.trandsai.com;
    return 301 https://www.trandsai.com$request_uri;
}

# 5. console.trandsai.com HTTPS 管理后台
server {
    listen 443 ssl;
    server_name console.trandsai.com;

    ssl_certificate /etc/nginx/cert/trandsai.com_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/trandsai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ✅ 先匹配API路由，优先转发到后端，避免进入前端SPA路由死循环
    location /companions/ {
        proxy_pass http://trandsai-backend:8000/companions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /knowledge/ {
        proxy_pass http://trandsai-backend:8000/knowledge/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /api/ {
        proxy_pass http://trandsai-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /ws/ {
        proxy_pass http://trandsai-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location = /docs {
        proxy_pass http://trandsai-backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs/ {
        proxy_pass http://trandsai-backend:8000/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://trandsai-backend:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html/file;
        try_files $uri $uri/ =404;
    }

    # ✅ 仅纯前端路由走admin页面，API路由已经优先匹配
    location / {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}

# 6. www.trandsai.com HTTPS 主站点
server {
    listen 443 ssl;
    server_name www.trandsai.com;

    ssl_certificate /etc/nginx/cert/trandsai.com_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/trandsai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html/file;
        try_files $uri $uri/ =404;
    }

    # 主前端页面
    location / {
        root /usr/share/nginx/html/frontend;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # 图片静态资源
    location /data/images/ {
        root /usr/share/nginx/html;
        expires 30d;
    }

    # API转发
    location /companions/ {
        proxy_pass http://trandsai-backend:8000/companions/;
