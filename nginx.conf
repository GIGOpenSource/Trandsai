# 统一80端口全部域名跳转HTTPS
server {
    listen 80;
    server_name trandsai.com www.trandsai.com console.trandsai.com;
    return 301 https://$host$request_uri;
}

# console.trandsai.com HTTPS 管理后台（不需要iframe放行头）
server {
    listen 443 ssl;
    server_name console.trandsai.com;

    ssl_certificate /etc/nginx/cert/trandsai.com_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/trandsai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 全局代理公共参数，所有location继承
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 180s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;

    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html/file;
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://trandsai-backend:8000/api/;
    }

    location ^~ /companions {
        proxy_pass http://trandsai-backend:8000/companions;
    }

    location ^~ /knowledge {
        proxy_pass http://trandsai-backend:8000/knowledge;
    }

    location /ws/ {
        proxy_pass http://trandsai-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /docs {
        proxy_pass http://trandsai-backend:8000/docs;
    }

    location /docs/ {
        proxy_pass http://trandsai-backend:8000/docs/;
    }

    location = /openapi.json {
        proxy_pass http://trandsai-backend:8000/openapi.json;
    }

    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;
        index index.html;
    }
}

# www.trandsai.com + 裸域名trandsai.com（需要允许console嵌入iframe）
server {
    listen 443 ssl;
    server_name www.trandsai.com trandsai.com;

    ssl_certificate /etc/nginx/cert/trandsai.com_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/trandsai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 允许console.trandsai.com嵌入iframe，always确保4xx/5xx页面也带该头
    add_header Content-Security-Policy "frame-ancestors https://console.trandsai.com" always;

    # 全局代理公共参数
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 180s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;

    location /.well-known/pki-validation/ {
        root /usr/share/nginx/html/file;
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://trandsai-backend:8000/api/;
    }


    location ^~ /companions {
        proxy_pass http://trandsai-backend:8000/companions;
    }

    location ^~ /knowledge {
        proxy_pass http://trandsai-backend:8000/knowledge;
    }

    location /ws/ {
        proxy_pass http://trandsai-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /docs {
        proxy_pass http://trandsai-backend:8000/docs;
    }

    location /docs/ {
        proxy_pass http://trandsai-backend:8000/docs/;
    }

    location = /openapi.json {
        proxy_pass http://trandsai-backend:8000/openapi.json;
    }

    location / {
        root /usr/share/nginx/html/frontend;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    location /data/images/ {
        root /usr/share/nginx/html;
        expires 30d;
    }
}