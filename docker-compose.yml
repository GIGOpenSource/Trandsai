version: '3.8'
networks:
  trand_net:


services:
  nginx:
    image: nginx:1.27-alpine
    container_name: trandsai-nginx
    restart: always
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    networks:
      - trand_net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./page/frontend:/usr/share/nginx/html/frontend:ro
      - ./page/admin:/usr/share/nginx/html/admin:ro
      - ./page/file:/usr/share/nginx/html/file:ro
      - ./page/cert:/etc/nginx/cert:ro
      - ./data:/usr/share/nginx/html/data:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    image: python:3.11-slim
    container_name: trandsai-backend
    restart: always
    networks:
      - trand_net
    volumes:
      - ./server:/app
      - .:/project_root
      - ./data:/app/data
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1"
    environment:
      TZ: Asia/Shanghai
      DOTENV_PATH: /project_root/.env