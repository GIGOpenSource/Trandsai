version: '3.8'

networks:
  trand_net:

services:
  # ========== Nginx 服务 ==========
  nginx:
    image: nginx:1.27-alpine
    container_name: trandsai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - trand_net
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./page/frontend:/usr/share/nginx/html/frontend:ro
      - ./page/admin:/usr/share/nginx/html/admin:ro
      - ./page/file:/usr/share/nginx/html/file:ro
      - ./page/cert:/etc/nginx/cert:ro
      - ./data:/usr/share/nginx/html/data:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ========== 后端服务 ==========
  backend:
    build:
      context: .
      dockerfile: Dockerfile.base
    container_name: trandsai-backend
    restart: always
    networks:
      - trand_net
    volumes:
      - ./server:/app
      - .:/project_root
      - ./data:/app/data
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      DOTENV_PATH: /project_root/.env
    depends_on:
      - db

  # ========== 数据库服务 ==========
  db:
    image: mysql:8.0
    container_name: trandsai-db
    restart: always
    networks:
      - trand_net
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trandsai}
      MYSQL_USER: ${MYSQL_USER:-trandsai}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trandsai123}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5